<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        
    
    <div class="one">
        <h1>Tic Tac Toe</h1>
        <div class="row1">
            <button class="box" data-index="0"></button>
            <button class="box" data-index="1"></button>
            <button class="box" data-index="2"></button>
        </div>
        <div class="row2">
            <button class="box" data-index="3"></button>
            <button class="box" data-index="4"></button>
            <button class="box" data-index="5"></button>
        </div>
        <div class="row3">
            <button class="box" data-index="6"></button>
            <button class="box" data-index="7"></button>
            <button class="box" data-index="8"></button>
        </div>
        <p id="para">Who Will Win ?</p>
        <button class="cssbuttons-io-button" id="reset">
            NEW GAME
            <div class="icon">
              <svg
                height="24"
                width="24"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="M0 0h24v24H0z" fill="none"></path>
                <path
                  d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z"
                  fill="currentColor"
                ></path>
              </svg>
            </div>
        </button>
    </div>

    <div class="two">
        <div class="player1">
            <h3 >Player X</h3>
            <p id="p1">0</p>
        </div>
        <div>
            <h3>Player O</h3>
            <p id="p2">0</p>
        </div>
    </div>

    </main>
    <script src="main.js"></script>
</body>
</html>
